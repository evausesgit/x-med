[phases.setup]
nixPkgs = ["python312", "uv", "nodejs_22"]

[phases.install]
cmds = [
  "uv sync --frozen --no-dev",
  "cd web && npm ci",
]

[phases.build]
# ⚠️ Next 16 fige les `rewrites()` AU BUILD (destination écrite en dur dans
# routes-manifest.json) — la valeur runtime de API_INTERNAL_URL est ignorée.
# On doit donc fixer la cible du proxy /api ICI, pas seulement au démarrage.
cmds = ["cd web && API_INTERNAL_URL=http://10.0.1.1:8800 npm run build"]

[start]
# Option A : le frontend déployé relaie /api vers l'API dev de la machine hôte
# (10.0.1.1 = passerelle du réseau Docker « coolify »), qui dispose de torch + des
# modèles d'embedding pour la recherche sémantique. L'API n'est donc PAS embarquée
# dans ce conteneur. Pré-requis côté hôte (voir aussi ETAT_DEMO.md) :
#   - API dev en écoute sur 0.0.0.0:8800 (et plus seulement 127.0.0.1) ;
#   - règle ufw : `ufw allow from 10.0.1.0/24 to any port 8800 proto tcp`.
cmd = "sh -c 'cd web && API_INTERNAL_URL=http://10.0.1.1:8800 npm run start'"
