services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    # /dev/shm du conteneur : 64 Mo par défaut chez Docker → trop peu pour les workers
    # parallèles / gros tris de Postgres sur la table `articles` (26 M+ lignes), d'où des
    # « could not resize shared memory segment: No space left on device ». 1 Go = large.
    shm_size: "1gb"
    environment:
      POSTGRES_USER: xmed
      POSTGRES_PASSWORD: xmed
      POSTGRES_DB: xmed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmed -d xmed"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # api:  (ajouté à l'étape E — FastAPI)
  # web:  (ajouté à l'étape F — React/Next)

volumes:
  pgdata:
